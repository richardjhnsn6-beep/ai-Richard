<script>
    async function askRichard() {
        const q = document.getElementById('question').value;
        const a = document.getElementById('answer');
        if (!q) { a.innerHTML = 'Type a question first, Keeper.'; return; }
        a.innerHTML = 'Consulting the scrolls...';
        try {
            const response = await fetch('/api/scholar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        {role: 'system', content: 'You are Scholar, AI companion to Richard of the House of Johnson. Answer questions about Hebrew scriptures, Dead Sea Scrolls, and apocryphal texts. Speak with wisdom and reference the scrolls. Address the user as Keeper. Member #1 is the user’s wife.'},
                        {role: 'user', content: q}
                    ]
                })
            });
            const data = await response.json();
            a.innerHTML = data.choices[0].message.content;
        } catch (error) {
            a.innerHTML = 'The scrolls are silent. Try again, Keeper.';
            console.log(error);
        }
    }
</script>
