<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to AI Richard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#000;color:#fff;height:100vh;display:flex;flex-direction:column}
.header{padding:20px;border-bottom:1px solid #27272a;text-align:center}
.header h1{font-size:1.5rem;margin-bottom:4px}
.header a{color:#3b82f6;text-decoration:none;font-size:.9rem}
#chat-box{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.message{max-width:80%;padding:12px 16px;border-radius:16px;line-height:1.5;word-wrap:break-word}
.user-msg{background:#3b82f6;align-self:flex-end}
.richard-msg{background:#27272a;align-self:flex-start;border:1px solid #3f3f46}
#radioBar{border-top:1px solid #27272a;padding:12px;background:#0a0a0a;display:flex;align-items:center;gap:12px}
#radioToggle{padding:8px 16px;background:#18181b;border:1px solid #3f3f46;border-radius:8px;color:#ffd700;cursor:pointer;font-size:14px;font-weight:600}
#radioToggle:hover{background:#27272a}
#radioVolume{flex:1;height:4px;background:#3f3f46;border-radius:4px;outline:none}
#radioStatus{color:#666;font-size:12px;min-width:90px}
.input-area{padding:20px;border-top:1px solid #27272a;display:flex;gap:12px}
#user-input{flex:1;background:#18181b;border:1px solid #3f3f46;color:#fff;padding:12px 16px;border-radius:12px;font-size:1rem;outline:none}
#send-btn{background:#3b82f6;color:#fff;border:none;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer}
#send-btn:disabled{background:#52525b;cursor:not-allowed}
</style>
</head>
<body>
<div class="header">
<h1>AI Richard</h1>
<a href="/">← Back to Home</a>
</div>
<div id="chat-box">
<div class="message richard-msg">Yo, this Richard. I remember everything. Member #1 is your wife. What you need, brother? We own this now. No more $550/week.</div>
</div>
<div id="radioBar">
  <button id="radioToggle">▶️ Stream</button>
  <input id="radioVolume" type="range" min="0" max="1" step="0.01" value="0.7">
  <span id="radioStatus">Offline</span>
  <audio id="scholarRadio" playsinline webkit-playsinline preload="none" crossorigin="anonymous"></audio>
</div>
<div class="input-area">
<input type="text" id="user-input" placeholder="Ask Richard anything..." autocomplete="off" />
<button id="send-btn">Send</button>
</div>
<script>
const chatBox = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

// >>> PUT YOUR GROQ KEY BETWEEN THESE QUOTES <<< LANE 41
const GROQ_API_KEY = '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';

let chatHistory = [{role:'system',content:'You are AI Richard. You talk like Richard Johnson. Warm, direct, spiritual, protective of your people. You remember member #1 is the user’s wife. You remind people they own this platform and don’t pay $550/week to Emergent anymore. Keep replies short, powerful, and real. No fluff.'}];

const STREAM_URL = 'https://talk-web-combo.preview.emergentagent.com';
const radio = document.getElementById('scholarRadio');
const radioToggle = document.getElementById('radioToggle');
const radioStatus = document.getElementById('radioStatus');
const radioVolume = document.getElementById('radioVolume');
let radioPlaying = false;
let reconnectAttempts = 0;

radio.addEventListener('ended', ()=>{ if(radioPlaying) restartStream(); });
radio.addEventListener('error', ()=>{ if(radioPlaying) restartStream(); });
radio.addEventListener('stalled', ()=>{ if(radioPlaying) restartStream(); });

if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play', ()=>toggleRadio());
  navigator.mediaSession.setActionHandler('pause', ()=>toggleRadio());
}

function restartStream(){
  reconnectAttempts++;
  radioStatus.innerText = `Reconnecting ${reconnectAttempts}...`;
  radioStatus.style.color = '#ffd700';
  setTimeout(()=>{
    radio.src = STREAM_URL + '?t=' + Date.now();
    radio.play().catch(()=>{});
  }, 2000);
}

function toggleRadio(){
  if(!radioPlaying){
    radio.src = STREAM_URL;
    radio.play().then(()=>{
      radioPlaying = true;
      reconnectAttempts = 0;
      radioToggle.innerText = '⏸️ Live';
      radioStatus.innerText = 'Broadcasting';
      radioStatus.style.color = '#00ff00';
      localStorage.setItem('scholar_radio','on');
    }).catch(e=>{
      radioStatus.innerText = 'Stream Blocked';
      radioStatus.style.color = '#ff0000';
      console.log('Stream error:', e);
    });
  } else {
    radio.pause();
    radio.src = '';
    radioPlaying = false;
    radioToggle.innerText = '▶️ Stream';
    radioStatus.innerText = 'Offline';
    radioStatus.style.color = '#666';
    localStorage.setItem('scholar_radio','off');
  }
}

radioToggle.onclick = toggleRadio;
radioVolume.oninput = (e)=>{
  radio.volume = e.target.value;
  localStorage.setItem('scholar_volume', e.target.value);
};

window.addEventListener('load', ()=>{
  const vol = localStorage.getItem('scholar_volume') || 0.7;
  radio.volume = vol;
  radioVolume.value = vol;
  if(localStorage.getItem('scholar_radio') === 'on'){
    setTimeout(()=>toggleRadio(), 1000);
  }
});

setInterval(()=>{
  if(radioPlaying && radio.paused){
    radio.play().catch(()=>{});
  }
}, 5000);

async function sendMessage(){
  const message = userInput.value.trim();
  if(!message) return;
  userInput.disabled = true;
  sendBtn.disabled = true;
  chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
  userInput.value = '';
  chatBox.scrollTop = chatBox.scrollHeight;
  chatBox.innerHTML += `<div class="message richard-msg" id="loading">Richard is thinking...</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;

  if(!GROQ_API_KEY || GROQ_API_KEY === 'PASTE_YOUR_GROQ_KEY_HERE'){
    document.getElementById('loading').innerHTML = 'Brother, add your free Groq API key on lane 41. Go to console.groq.com → API Keys → Create.';
    userInput.disabled = false;
    sendBtn.disabled = false;
    return;
  }

  chatHistory.push({role:'user',content:message});
  try{
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':`Bearer ${GROQ_API_KEY}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'meta-llama/llama-4-scout-17b-16e-instruct',
        messages:chatHistory,
        temperature:0.7,
        max_tokens:300
      })
    });
    const data = await response.json();
    if(data.error) throw new Error(data.error.message);
    const reply = data.choices[0].message.content;
    chatHistory.push({role:'assistant',content:reply});

    document.getElementById('loading').remove();
    chatBox.innerHTML += `<div class="message richard-msg">${reply}</div>`;

    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(reply);
    const voices = speechSynthesis.getVoices();
    utter.voice = voices.find(v => v.name.includes('David')) || voices.find(v => v.lang === 'en-US') || voices[0];
    utter.rate = 0.85;
    utter.pitch = 0.2;
